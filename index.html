<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終活・未来へのヒント（記事一覧）</title>
    <style>
        :root { --accent: #007bff; --bg-light: #f0f4f8; }
        * { box-sizing: border-box; }

        body { 
            font-family: sans-serif; 
            background-color: #f0f2f5; 
            margin: 0;
            padding: 0;
            font-size: 18px; 
            color: #333;
            line-height: 1.6;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        @media (max-width: 600px) {
            .wrap { padding: 10px; }
        }

        /* バナー・ヘッダー */
        .banner-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 8px; }
        
        .header-copy { text-align: center; margin: 20px 0; }
        .header-copy span { display: block; font-size: 21px; color: #0000ff; font-weight: bold; }
        .header-title { text-align: center; font-size: 24px; margin: 20px 0; border-bottom: none; }

        /* 検索窓 */
        .search-container { text-align: center; margin-bottom: 15px; }
        #searchInput {
            width: 100%;
            max-width: 600px;
            padding: 12px 20px;
            font-size: 18px;
            border: 2px solid var(--accent);
            border-radius: 25px;
            outline: none;
        }

        /* ページネーション */
        .pagination {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 15px;
        }
        
        .pagination button {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid var(--accent);
            background-color: #e9f5ff;
            color: var(--accent);
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            min-width: 45px;
        }
        
        .pagination button.active {
            background-color: var(--accent);
            color: white;
        }

        .info-text { text-align: center; font-size: 14px; color: #666; margin-bottom: 10px; }

        /* タイトル一覧 */
        .list-section-title { 
            font-size: 20px; 
            font-weight: bold; 
            margin: 25px 0 10px; 
            border-left: 6px solid var(--accent); 
            padding: 5px 12px; 
            background: var(--bg-light); 
        }

        .titles { margin-bottom: 20px; padding: 0; list-style: none; }
        .titles li { 
            margin: 0; 
            padding: 12px;
            cursor: pointer; 
            color: blue; 
            text-decoration: underline; 
            border-bottom: 1px solid #eee;
            font-size: 18px; 
        }
        .titles li:hover { background: #f9f9f9; }

        /* 記事本文エリア 【スマホ対応調整】 */
        .article-container {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            height: 600px;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            background: #fff;
            scroll-behavior: smooth;
        }

        .article-header {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
            border-left: 6px solid var(--accent);
            padding: 10px 12px;
            background: var(--bg-light);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .article-content { 
            /* スマホでタイトルが3行になっても被らないようpaddingを確保 */
            padding: 120px 20px 40px 20px; 
            scroll-margin-top: 60px;
        }
        
        .article-content p {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 19px;
            margin: 0;
        }

        /* キャッチフレーズの装飾 */
        .catch-quotes {
            background: #fff9e6;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px dashed #ffcc00;
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="banner-container">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg">
    </div>

    <div class="header-copy">
        <span>「知らない」はリスク</span>
        <span>「知る」はギフト。</span>
    </div>

    <h2 class="header-title">これからを整える<br>未来へのヒント</h2>

    <div class="catch-quotes">
        【考えるのは、今。安心するのは、これから。】<br>
        【迷わせない準備が、いちばんの優しさ。】<br>
        【これからを整える、最高の「ありがとう」のために。】
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="キーワードで検索...">
    </div>

    <div id="pagination" class="pagination"></div>
    <p class="info-text" id="resultCount"></p>

    <div class="list-section-title">タイトル一覧</div>
    <ul class="titles" id="titleList"></ul>

    <hr>

    <div class="article-container" id="scrollBox">
        <div id="articleDisplay">
            <div class="article-header">記事を選択してください</div>
            <div class="article-content"><p>上のリストから読みたい項目を選んでください。</p></div>
        </div>
    </div>
</div>

<script>
// 記事データ（一部抜粋：提供された全データがここに反映される想定）
const articles = [
    { title: "1、介護保険を利用するには、どうしたらよいか？", content: "介護保険を利用するには、どうしたらよいか？介護保険サービスを利用できるのは65歳以上の人ですが、４0歳以上でも特定の条件があれば介護保険サービスを受けられます。\n\n介護サービスを利用するには生活をするうえでどのくらいの支障がでているのかを判定する必要があります。\n\nそのために「要介護認定」の申請をします。\n\n初めに市町村役場に行きます。\n\n面談により聞き取り調査や主治医の資料をベースに、要支援か要介護かが決められます。\n\n要支援1、要支援2、要介護1、要介護2、要介護3、要介護4、要介護5の7段階に分かれています。\n\n要支援、要介護の段階により、受けられるサービス金額が違います。\n\n認定が完了する前には３０日程かかります。" },
    { title: "2、任意後見契約とはなんですか？", content: "任意後見契約とはなんですか？今は大丈夫だが、認知症などで判断する能力が低くなったら、自分の代わりに財産管理をしてもらわなくてはいけません、信頼できる任意後見人を決めて契約しておきます。\n\nそうしないとあなたの事を誰も見る事が出来なくなります。\n\n重要な契約となりますので公正証書を作成します。\n\nおひとりさまや単独所帯など、葬儀や納骨についても助けてほしい人は「死後事務委任契約」を結べます。" },
    { title: "3、献体とはどういう事をするのですか？", content: "献体とはどういう事をするのですか？献体を申し込むと、医学のために、死後に遺体を提供することです。\n\n献体を登録するには住んでいる都道府県の大学医学部または、（財）日本篤志献体協会に申し込めばいいのです。\n\n最近は、献体登録される方が増えて、一部の大学では制限しているところもあります。" },
    { title: "4、生前予約とはなんですか？", content: "生前予約とはなんですか？自分らしいお葬式、遺族の負担をできるだけ軽減したいという思いから、生前に葬儀社と打ち合わせをし、内容や予算を決めておく事です。\n\nこれが生前予約といいます。\n\n葬儀業社等との間で取り決めをする際には、信頼できる業者かをしっかり見極めることが大切です。\n\n事前にお金を納入した業者が倒産するというトラブルもありますのでご注意ください。" },
    // ... (以下、91番までデータが続く)
    { title: "5、家族葬は安くなりますか？", content: "（中略）納得できる費用のかけかたができ、弔問客に気遣いをするということが少ないといったメリットがあります..." },
    { title: "20、介護保険を利用するには何歳からですか？", content: "介護保険サービスを活用することができるとされているのは原則65歳過ぎの人となります。要介護認定の申し込みからスタートします。" },
    { title: "42、遺言の種類を覚えておこう", content: "自筆証書遺言、公正証書遺言が一般的です。自筆は全て肉筆で書く必要があります。" },
    { title: "91、相続税申告は期間が決められています", content: "故人が一定額の相続財産を持っていて相続税が生じる際、10ヶ月以内に申告が必要です。" }
];

// ※ 実際の運用時は、ここに152記事分すべてのオブジェクトを追加してください。

let currentPage = 1;
const itemsPerPage = 10;
let filteredArticles = [...articles];

const searchInput = document.getElementById('searchInput');
const titleList = document.getElementById('titleList');
const pagination = document.getElementById('pagination');
const resultCount = document.getElementById('resultCount');
const articleDisplay = document.getElementById('articleDisplay');
const scrollBox = document.getElementById('scrollBox');

function render() {
    titleList.innerHTML = '';
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filteredArticles.slice(start, end);

    pageItems.forEach((art) => {
        const li = document.createElement('li');
        li.textContent = art.title;
        li.onclick = () => showArticle(art);
        titleList.appendChild(li);
    });

    updatePagination();
    resultCount.textContent = `全 ${filteredArticles.length} 件中 ${start + 1} ～ ${Math.min(end, filteredArticles.length)} 件表示`;
}

function showArticle(art) {
    articleDisplay.innerHTML = `
        <div class="article-header">${art.title}</div>
        <div class="article-content"><p>${art.content.replace(/<br>/g, '\n')}</p></div>
    `;
    // 記事を表示したらスクロールエリアの最上部へ
    scrollBox.scrollTop = 0;
}

function updatePagination() {
    pagination.innerHTML = '';
    const totalPages = Math.ceil(filteredArticles.length / itemsPerPage);

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === currentPage) btn.className = 'active';
        btn.onclick = () => {
            currentPage = i;
            render();
            window.scrollTo({ top: searchInput.offsetTop - 20, behavior: 'smooth' });
        };
        pagination.appendChild(btn);
    }
}

searchInput.oninput = () => {
    const val = searchInput.value.toLowerCase();
    filteredArticles = articles.filter(a => 
        a.title.toLowerCase().includes(val) || a.content.toLowerCase().includes(val)
    );
    currentPage = 1;
    render();
};

// 初期表示
render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事一覧＆詳細表示</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f2f5;
            margin: 0; padding: 0; color: #333;
        }

        .container {
            width: 100%; max-width: 900px;
            margin: 0 auto; background-color: #fff;
            padding: 20px; min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* 検索エリア */
        .search-box {
            position: sticky; top: 0; background: #fff;
            padding: 10px 0; z-index: 100; border-bottom: 1px solid #eee;
        }
        #searchInput {
            width: 100%; padding: 12px 20px; font-size: 16px;
            border: 2px solid #007bff; border-radius: 25px; outline: none;
        }

        /* ページネーション */
        .pagination { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 15px 0; }
        .pagination button {
            padding: 6px 12px; border: 1px solid #007bff; background: #fff;
            color: #007bff; border-radius: 4px; cursor: pointer;
        }
        .pagination button.active { background: #007bff; color: #fff; font-weight: bold; }

        /* リスト表示（スクロールエリア） */
        .list-container {
            border: 1px solid #ddd; border-radius: 8px;
            max-height: 400px; overflow-y: auto; margin-bottom: 20px;
            background: #fafafa;
        }
        .titles { margin: 0; padding: 0; list-style: none; }
        .titles li { 
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee;
            font-size: 17px; color: #0000ee; text-decoration: underline;
        }
        .titles li:hover { background-color: #f0f7ff; }
        .titles li.active-item { 
            background-color: #007bff; color: #fff; 
            text-decoration: none; font-weight: bold;
        }

        /* 詳細表示カード（常に一覧の下に位置） */
        .detail-card {
            margin-top: 30px; border: 2px solid #007bff; border-radius: 12px;
            overflow: hidden; display: none; /* 最初は隠す */
            background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .detail-header {
            background-color: #f0f7ff; padding: 15px; font-size: 18px;
            font-weight: bold; border-bottom: 1px solid #007bff; color: #007bff;
        }
        .detail-body { padding: 20px; font-size: 18px; line-height: 1.8; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            .list-container { max-height: 300px; }
            .detail-body { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center;">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" style="max-width:100%; border-radius:8px;">
        <h2 style="color:#333;">終活のヒント 一覧</h2>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="気になる言葉で検索...">
    </div>

    <div id="pagination" class="pagination"></div>

    <div class="list-container">
        <ul class="titles" id="titleList"></ul>
    </div>

    <div id="detailView" class="detail-card">
        <div class="detail-header" id="targetTitle"></div>
        <div class="detail-body" id="targetContent"></div>
    </div>
</div>

<script>
// 記事データ（配列の閉じ忘れを修正済み）
const articles = [
    { title: "1、介護保険を利用するには、どうしたらよいか？", content: "介護保険を利用するには、どうしたらよいか？介護保険サービスを利用できるのは65歳以上の人ですが、４0歳以上でも特定の条件があれば介護保険サービスを受けられます。<br><br>要介護認定の申請を市町村役場で行いましょう。" },
    { title: "2、任意後見契約とはなんですか？", content: "認知症などで判断能力が低下した際に備え、あらかじめ代理人を決めておく契約です。公正証書での作成が推奨されます。" },
    { title: "3、献体とはどういう事をするのですか？", content: "医学の発展のために、死後に遺体を提供することです。大学等への事前登録と家族の同意が必要です。" },
    // （お手元の4〜84番をここに挿入してください）
    { title: "85、介護保険制度についてなぜ「かかりつけ医」が必要なの？", content: "要介護認定の際、医師の意見書が必要です。普段の健康状態を把握している「かかりつけ医」の意見は判定に大きく影響します。" }
];

let filtered = [...articles];
const perPage = 10;
let page = 1;

function render() {
    const list = document.getElementById('titleList');
    list.innerHTML = '';
    const start = (page - 1) * perPage;
    const current = filtered.slice(start, start + perPage);

    current.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item.title;
        li.onclick = function() {
            // 他の選択を解除
            document.querySelectorAll('.titles li').forEach(el => el.classList.remove('active-item'));
            // 選択中を強調
            this.classList.add('active-item');
            // 詳細を表示
            showDetail(item);
        };
        list.appendChild(li);
    });
    renderPager();
}

function renderPager() {
    const pager = document.getElementById('pagination');
    pager.innerHTML = '';
    const total = Math.ceil(filtered.length / perPage);
    for (let i = 1; i <= total; i++) {
        const b = document.createElement('button');
        b.textContent = i;
        if (i === page) b.className = 'active';
        b.onclick = () => { page = i; render(); };
        pager.appendChild(b);
    }
}

function showDetail(item) {
    const view = document.getElementById('detailView');
    document.getElementById('targetTitle').textContent = item.title;
    document.getElementById('targetContent').innerHTML = item.content;
    view.style.display = 'block';
    
    // カードが見える位置までスクロール
    view.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('searchInput').oninput = (e) => {
    const val = e.target.value.toLowerCase();
    filtered = articles.filter(a => a.title.includes(val) || a.content.includes(val));
    page = 1;
    render();
};

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来へのヒント - 終活ガイド</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f4f8;
            margin: 0; padding: 0; color: #333;
        }

        .container {
            width: 100%; max-width: 800px;
            margin: 0 auto; background-color: #fff;
            min-height: 100vh; padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 検索・一覧エリア */
        #listView { display: block; }
        
        /* 記事詳細カードエリア（最初は隠す） */
        #cardView { 
            display: none; 
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-input {
            width: 100%; padding: 15px; font-size: 16px;
            border: 2px solid #007bff; border-radius: 30px;
            margin-bottom: 20px; outline: none;
        }

        /* リストのスタイル */
        .title-list { list-style: none; padding: 0; }
        .title-item {
            padding: 15px; border-bottom: 1px solid #eee;
            cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-item:hover { background-color: #f8fbff; }
        .title-item::after { content: '▶'; color: #007bff; font-size: 12px; }

        /* カードのスタイル */
        .card {
            border: 2px solid #007bff; border-radius: 15px;
            overflow: hidden; background: #fff;
        }
        .card-header {
            background-color: #007bff; color: white;
            padding: 20px; font-size: 20px; font-weight: bold;
        }
        .card-body {
            padding: 25px; font-size: 18px; line-height: 1.8;
            color: #444; white-space: pre-wrap;
        }

        /* 戻るボタン */
        .back-btn {
            display: inline-block; margin-bottom: 15px;
            padding: 10px 20px; background: #666; color: #fff;
            border-radius: 5px; cursor: pointer; text-decoration: none;
        }

        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 20px; flex-wrap: wrap; }
        .pagination button { padding: 8px 12px; border: 1px solid #007bff; background: #fff; color: #007bff; border-radius: 4px; cursor: pointer; }
        .pagination button.active { background: #007bff; color: #fff; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .card-header { font-size: 18px; }
            .card-body { font-size: 17px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="listView">
        <div style="text-align:center; margin-bottom:20px;">
            <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" style="max-width:100%; border-radius:8px;">
            <h2 style="color:#007bff;">未来へのヒント一覧</h2>
        </div>

        <input type="text" id="searchInput" class="search-input" placeholder="キーワードで検索...">
        
        <div id="pagination" class="pagination"></div>
        <ul id="titleList" class="title-list"></ul>
    </div>

    <div id="cardView">
        <div class="back-btn" onclick="showList()">← 一覧に戻る</div>
        <div class="card">
            <div class="card-header" id="cardTitle"></div>
            <div class="card-body" id="cardContent"></div>
        </div>
    </div>
</div>

<script>
const articles = [
    { title: "1、介護保険を利用するには、どうしたらよいか？", content: "介護保険を利用するには、どうしたらよいか？介護保険サービスを利用できるのは65歳以上の人ですが、４0歳以上でも特定の条件があれば介護保険サービスを受けられます。\n\nまずは市町村役場へ行き、要介護認定の申請を行いましょう。認定には約30日ほどかかります。" },
    { title: "2、任意後見契約とはなんですか？", content: "今は大丈夫だが、将来認知症などで判断能力が低下した時に備え、自分の代わりに財産管理などをしてもらう人を決めておく契約です。公正証書で作成します。" },
    { title: "3、献体とはどういう事をするのですか？", content: "医学の発展のために、死後に自分の遺体を提供することです。大学や協会に生前登録が必要で、家族の同意も必須となります。" },
    // ...ここに4番以降のデータを追加してください
    { title: "85、介護保険制度についてなぜ「かかりつけ医」が必要なの？", content: "要介護認定の際、医師の意見書が必要です。普段の様子をよく知る「かかりつけ医」がいることで、より正確な判定を受けることができます。" }
];

let filteredArticles = [...articles];
const itemsPerPage = 10;
let currentPage = 1;

function renderList() {
    const list = document.getElementById('titleList');
    list.innerHTML = '';
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const currentItems = filteredArticles.slice(start, end);

    currentItems.forEach(art => {
        const li = document.createElement('li');
        li.className = 'title-item';
        li.textContent = art.title;
        li.onclick = () => showCard(art);
        list.appendChild(li);
    });
    renderPagination();
}

function renderPagination() {
    const nav = document.getElementById('pagination');
    nav.innerHTML = '';
    const totalPages = Math.ceil(filteredArticles.length / itemsPerPage);
    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === currentPage) btn.className = 'active';
        btn.onclick = () => { currentPage = i; renderList(); window.scrollTo(0,0); };
        nav.appendChild(btn);
    }
}

function showCard(art) {
    document.getElementById('cardTitle').textContent = art.title;
    document.getElementById('cardContent').innerHTML = art.content.replace(/\n/g, '<br>');
    document.getElementById('listView').style.display = 'none';
    document.getElementById('cardView').style.display = 'block';
    window.scrollTo(0,0);
}

function showList() {
    document.getElementById('listView').style.display = 'block';
    document.getElementById('cardView').style.display = 'none';
}

document.getElementById('searchInput').oninput = (e) => {
    const word = e.target.value.toLowerCase();
    filteredArticles = articles.filter(a => a.title.includes(word) || a.content.includes(word));
    currentPage = 1;
    renderList();
};

renderList();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事ページ切替（レスポンシブ版）</title>
    <style>
        /* 全体のリセットと基本設定 */
        * { box-sizing: border-box; }

        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 0;
            color: #333;
            /* スマホでの横揺れ防止 */
            overflow-x: hidden; 
        }

        /* メインコンテナ：PCでは1000px、スマホでは100% */
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-height: 100vh;
        }

        /* 画像のレスポンシブ対応 */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 15px;
            border-radius: 8px;
        }

        /* 検索窓の幅調整 */
        .search-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        #searchInput {
            width: 100%;
            max-width: 600px;
            padding: 12px 20px;
            font-size: 18px;
            border: 2px solid #007bff;
            border-radius: 25px;
            outline: none;
            display: block;
            margin: 0 auto;
        }

        /* ページネーション：スマホでボタンがはみ出さないよう調整 */
        .pagination {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 0 5px;
        }
        
        .pagination button {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #e9f5ff;
            color: #007bff;
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.2s;
            /* スマホで押しやすい最小サイズ */
            min-width: 44px; 
        }
        
        .pagination button.active {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        /* タイトル一覧のリスト */
        .titles { 
            margin: 0 0 30px 0; 
            padding: 0; 
            list-style: none;
        }
        .titles li { 
            margin: 0;
            padding: 15px 10px;
            cursor: pointer; 
            color: #0000ee; 
            text-decoration: underline; 
            font-size: 19px; 
            line-height: 1.4;
            border-bottom: 1px solid #eee;
        }
        .titles li:hover {
            background-color: #f8f9fa;
        }

        /* 記事表示エリア：スマホでの重なり防止 */
        .article-box {
            border: 2px solid #007bff;
            border-radius: 8px;
            margin-top: 20px;
            position: relative;
            background-color: #fff;
            /* 高さ固定で見やすく */
            height: 500px;
            overflow-y: auto;
        }

        /* 記事タイトル（固定ヘッダー） */
        .article-header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            background-color: #f0f7ff;
            padding: 15px;
            font-weight: bold;
            font-size: 20px;
            border-bottom: 2px solid #007bff;
            z-index: 10;
            margin: 0;
        }

        /* 記事本文：スマホの3行タイトルに備えて余白を広く */
        .article-body {
            padding: 120px 20px 30px 20px; /* 上部120pxあけることで被りを防止 */
        }
        .article-body p {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 19px;
            margin: 0;
        }

        /* スマホ向け（画面幅600px以下）の微調整 */
        @media (max-width: 600px) {
            .container { padding: 15px 10px; }
            .header-title { font-size: 22px !important; }
            .titles li { font-size: 17px; padding: 12px 5px; }
            #searchInput { font-size: 16px; }
            /* ページネーションのボタンを少し小さく */
            .pagination button {
                padding: 6px 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="メイン画像">
    
    <div style="text-align:center; font-weight:bold; margin:10px 0;">
        <div style="font-size: 21px; color: #0000ff;">「知らない」はリスク</div>
        <div style="font-size: 21px; color: #0000ff;">「知る」はギフト。</div>
    </div>

    <h2 class="header-title" style="text-align:center; font-size: 24px; line-height: 1.4; margin: 20px 0;">
        これからを整える<br>未来へのヒント
    </h2>

    <div style="text-align:center; font-size: 16px; color:#555; margin-bottom: 20px; line-height: 1.6;">
        【考えるのは、今。安心するのは、これから。】<br>
        【迷わせない準備が、いちばんの優しさ。】<br>
        【これからを整える、最高の「ありがとう」のために。】
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="キーワードで検索...">
    </div>

    <div id="pagination" class="pagination"></div>
    <p style="text-align:center; font-size:14px; color:#666;" id="resultCount"></p>

    <h2 style="font-size: 20px; border-left: 5px solid #007bff; padding-left: 10px; margin: 30px 0 10px;">タイトル一覧</h2>
    <ul class="titles" id="titleList"></ul>

    <hr>

    <div class="article-box" id="articleArea">
        <div id="articleContent">
            <h3 class="article-header" id="currentTitle">記事を選択してください</h3>
            <div class="article-body">
                <p id="currentText">上のリストから読みたい項目をクリックすると、ここに内容が表示されます。</p>
            </div>
        </div>
    </div>
</div>

<script>
// 記事データ（91番まで反映済みの想定）
const articles = [
    { title: "1、介護保険を利用するには、どうしたらよいか？", content: "介護保険を利用するには、どうしたらよいか？介護保険サービスを利用できるのは65歳以上の人ですが、４0歳以上でも特定の条件があれば介護保険サービスを受けられます。\n\n要介護認定の申請を市町村役場で行います。" },
    { title: "2、任意後見契約とはなんですか？", content: "任意後見契約とはなんですか？今は大丈夫だが、認知症などで判断する能力が低くなったら、自分の代わりに財産管理をしてもらう契約です。公正証書を作成します。" },
    { title: "3、献体とはどういう事をするのですか？", content: "献体とはどういう事をするのですか？献体を申し込むと、医学のために、死後に遺体を提供することです。" },
    // ... データの続きは省略（お手元のフルデータをここに入れてください）
    { title: "91、相続税申告は期間が決められています", content: "相続税の申告は、相続の開始を知った日の翌日から10か月以内に行う必要があります。" }
];

let filteredArticles = [...articles];
const itemsPerPage = 10;
let currentPage = 1;

function renderList() {
    const list = document.getElementById('titleList');
    list.innerHTML = '';
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const currentItems = filteredArticles.slice(start, end);

    currentItems.forEach(art => {
        const li = document.createElement('li');
        li.textContent = art.title;
        li.onclick = () => {
            document.getElementById('currentTitle').textContent = art.title;
            document.getElementById('currentText').innerHTML = art.content.replace(/\n/g, '<br>');
            // 記事を開いたらその場所（枠内）のトップへスクロール
            document.getElementById('articleArea').scrollTop = 0;
        };
        list.appendChild(li);
    });

    renderPagination();
    document.getElementById('resultCount').textContent = `全 ${filteredArticles.length} 件`;
}

function renderPagination() {
    const nav = document.getElementById('pagination');
    nav.innerHTML = '';
    const totalPages = Math.ceil(filteredArticles.length / itemsPerPage);

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === currentPage) btn.className = 'active';
        btn.onclick = () => {
            currentPage = i;
            renderList();
            // ページを切り替えたら検索窓あたりまで戻る
            window.scrollTo({top: document.querySelector('.search-container').offsetTop - 20, behavior: 'smooth'});
        };
        nav.appendChild(btn);
    }
}

document.getElementById('searchInput').oninput = (e) => {
    const word = e.target.value.toLowerCase();
    filteredArticles = articles.filter(a => a.title.includes(word) || a.content.includes(word));
    currentPage = 1;
    renderList();
};

renderList();
</script>

</body>
</html>

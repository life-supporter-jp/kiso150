<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来へのヒント - 800pxワイドレイアウト</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f2f5;
            margin: 0; padding: 0; color: #333;
            display: flex;
            justify-content: center;
        }

        .container {
            /* 横幅を800pxに設定 */
            width: 100%;
            max-width: 800px; 
            background-color: #fff;
            padding: 30px; /* 余白を少し広げてゆとりを */
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* 検索ボックス */
        .search-box {
            position: sticky; top: 0; background: #fff;
            padding: 15px 0; z-index: 100;
            border-bottom: 1px solid #f0f0f0;
        }
        #searchInput {
            width: 100%; padding: 14px 25px; font-size: 18px;
            border: 2px solid #007bff; border-radius: 30px; outline: none;
        }

        /* ページネーション */
        .pagination { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; }
        .pagination button {
            padding: 8px 14px; border: 1px solid #007bff; background: #fff;
            color: #007bff; border-radius: 6px; cursor: pointer; font-size: 15px;
        }
        .pagination button.active { background: #007bff; color: #fff; font-weight: bold; }

        /* タイトルリスト表示エリア */
        .list-container {
            border: 1px solid #ddd; border-radius: 10px;
            max-height: 400px; overflow-y: auto; 
            margin-bottom: 30px; background: #fafafa;
        }
        .titles { margin: 0; padding: 0; list-style: none; }
        .titles li { 
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #eee;
            font-size: 18px; color: #0000ee; text-decoration: underline;
            line-height: 1.5; transition: background 0.2s;
        }
        .titles li:hover { background-color: #f0f7ff; }
        .titles li.active-item { 
            background-color: #007bff; color: #fff; 
            text-decoration: none; font-weight: bold;
        }

        /* 詳細カード */
        .detail-card {
            border: 2px solid #007bff; border-radius: 15px;
            overflow: hidden; display: none;
            background: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            margin-bottom: 50px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-header {
            background-color: #f0f7ff; padding: 20px; font-size: 20px;
            font-weight: bold; border-bottom: 1px solid #007bff; color: #007bff;
        }
        .detail-body { padding: 30px; font-size: 19px; line-height: 1.8; }

        /* スマホ向け調整 */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .detail-body { font-size: 17px; padding: 20px; }
            .titles li { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom: 15px;">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" style="max-width:100%; border-radius:8px;">
        <h2 style="font-size: 24px; color: #333; margin: 15px 0;">これからの安心を支える「未来へのヒント」</h2>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="キーワードで検索...">
    </div>

    <div id="pagination" class="pagination"></div>

    <div class="list-container">
        <ul class="titles" id="titleList"></ul>
    </div>

    <div id="detailView" class="detail-card">
        <div class="detail-header" id="targetTitle"></div>
        <div class="detail-body" id="targetContent"></div>
    </div>
</div>

<script>
const articles = [
    { title: "1、介護保険を利用するには、どうしたらよいか？", content: "介護保険を利用するには、どうしたらよいか？介護保険サービスを利用できるのは65歳以上の人ですが、４0歳以上でも特定の条件があれば介護保険サービスを受けられます。<br><br>まずは市町村役場へ行き、要介護認定の申請を行いましょう。窓口で相談すれば丁寧に案内してもらえます。" },
    { title: "2、任意後見契約とはなんですか？", content: "将来、認知症などで判断能力が低下した時に備え、自分の代わりに財産管理などをしてもらう人をあらかじめ公的に決めておく契約です。公正証書で作成し、法的に守られた権利を行使できます。" },
    { title: "3、献体とはどういう事をするのですか？", content: "医学の教育・研究の発展のために、死後に自分の遺体を無償で提供することです。生前に大学や登録機関へ登録し、ご家族の承諾を得ておく必要があります。" },
    // 追加データ（4番以降）
    { title: "85、介護保険制度についてなぜ「かかりつけ医」が必要なの？", content: "要介護認定の際、主治医の意見書が必要となります。普段の体調や生活状況をよく理解している「かかりつけ医」がいることで、より適切な判定が受けやすくなります。" }
];

let filtered = [...articles];
const perPage = 10;
let page = 1;

function render() {
    const list = document.getElementById('titleList');
    list.innerHTML = '';
    const start = (page - 1) * perPage;
    const current = filtered.slice(start, start + perPage);

    current.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item.title;
        li.onclick = function() {
            document.querySelectorAll('.titles li').forEach(el => el.classList.remove('active-item'));
            this.classList.add('active-item');
            showDetail(item);
        };
        list.appendChild(li);
    });
    renderPager();
}

function renderPager() {
    const pager = document.getElementById('pagination');
    pager.innerHTML = '';
    const total = Math.ceil(filtered.length / perPage);
    for (let i = 1; i <= total; i++) {
        const b = document.createElement('button');
        b.textContent = i;
        if (i === page) b.className = 'active';
        b.onclick = () => { page = i; render(); };
        pager.appendChild(b);
    }
}

function showDetail(item) {
    const view = document.getElementById('detailView');
    document.getElementById('targetTitle').textContent = item.title;
    document.getElementById('targetContent').innerHTML = item.content;
    view.style.display = 'block';
    
    // カードが見やすいようにスクロール
    view.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('searchInput').oninput = (e) => {
    const val = e.target.value.toLowerCase();
    filtered = articles.filter(a => a.title.includes(val) || a.content.includes(val));
    page = 1;
    document.getElementById('detailView').style.display = 'none';
    render();
};

render();
</script>
</body>
</html>
